<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispr — Interactive Sitemap & User Flows</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0b; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ═══════════════════════════════════════
   DATA: SITEMAP STRUCTURE + FLOW DETAILS
   ═══════════════════════════════════════ */

const siteData = {
  home: {
    label: "Home / Landing",
    color: "#22c55e",
    icon: "🏠",
    description: "The main entry point for all visitors — fans and creators alike.",
    flow: [
      "Hero section with clear value proposition: \"Get personalized advice from creators you trust\"",
      "Featured creators grid showing top/trending profiles with photo, name, category, and price",
      "How it works section: 3 steps — Choose a Creator → Send a Message → Get a Reply",
      "Social proof section with fan testimonials and platform stats",
      "Dual CTA: \"Browse Creators\" (for fans) and \"Become a Creator\" (for creators)",
      "FAQ section addressing common questions about pricing, response times, and refunds",
      "Footer with links to Terms of Service, Privacy Policy, and Support",
    ],
  },

  // ─── FAN SIDE ───
  fanRegistration: {
    label: "Fan Registration",
    color: "#3b82f6",
    icon: "📝",
    description: "Streamlined sign-up flow designed to minimize friction. Fans should go from landing to sending their first message as quickly as possible.",
    flow: [
      "Landing page with clear value prop and featured creators",
      "Sign up via Email/Password, Google OAuth, or Apple Sign-In",
      "Minimal profile setup: display name only (optional avatar)",
      "Browse creators or follow a creator's direct link",
      "Payment method captured at point of first message (not during registration)",
    ],
  },
  fanDashboard: {
    label: "Fan Dashboard",
    color: "#3b82f6",
    icon: "💬",
    description: "The fan's home base after logging in. Shows all active conversations and quick access to account settings.",
    flow: [
      "Conversation list showing all creators the fan has messaged, sorted by most recent",
      "Each conversation row shows: creator avatar, name, last message preview, timestamp, and unread indicator",
      "Unread messages from creators highlighted with visual badge",
      "\"Explore Creators\" CTA for fans who want to message someone new",
      "Quick access to Account settings and payment info via top navigation tab",
    ],
  },
  fanMessageThread: {
    label: "Message Thread",
    color: "#3b82f6",
    icon: "🗨️",
    description: "The core messaging experience. iMessage-style threaded view between a fan and a single creator.",
    flow: [
      "Thread header with creator name, avatar, price per message, and category tags",
      "Message bubbles: fan messages aligned right (purple), creator replies aligned left (gray)",
      "Each message shows timestamp below the bubble",
      "Prepaid message credit indicator if fan purchased a bulk pack (e.g. \"3 messages remaining\")",
      "Compose area at bottom with text input and Send button showing price",
      "If no prepaid credits, Send button triggers Stripe payment before message is delivered",
      "Success confirmation with \"You'll be notified when [Creator] replies\" message",
    ],
  },
  fanAccount: {
    label: "Fan Account",
    color: "#3b82f6",
    icon: "👤",
    description: "Fan's personal settings and payment information management.",
    flow: [
      "Profile section: display name, email, avatar, member since date with Edit button",
      "Payment method section: stored card info (last 4 digits, expiry) with Change button",
      "Message credits section: shows remaining prepaid messages per creator",
      "Activity summary: total amount spent and total messages sent",
      "Log out button",
    ],
  },

  // ─── CREATOR SIDE ───
  creatorRegistration: {
    label: "Creator Onboarding",
    color: "#a855f7",
    icon: "🌟",
    description: "Creator sign-up includes additional steps for identity verification and payment setup through Stripe Connect.",
    flow: [
      "\"Become a Creator\" CTA from landing page or direct invitation link",
      "Sign up via Email/Password, Google OAuth, or Apple Sign-In",
      "Profile setup: display name, bio, profile photo, category tags",
      "Set pricing: price per message and estimated response window",
      "Stripe Connect onboarding: identity verification (KYC), bank account or debit card for payouts",
      "Review and publish profile — creator profile goes live immediately",
      "Redirect to Creator Dashboard with a welcome tour highlighting key features",
    ],
  },
  creatorProfile: {
    label: "Creator Profile",
    color: "#a855f7",
    icon: "🎭",
    description: "The public-facing page that fans see. This is the main conversion point where fans decide to send a paid message.",
    flow: [
      "Profile header: avatar with online status, creator name, handle, category tags",
      "Bio section explaining the creator's expertise and what fans can ask about",
      "Stats bar: total fans, total replies, average response time",
      "Pricing card: price per message prominently displayed with response time estimate",
      "Primary CTA: \"Send a Message — $X\" button opens the message compose modal",
      "Secondary CTA: \"Buy Message Packs\" for bulk discounted purchases",
      "Fan testimonials section showing reviews from previous conversations",
      "Powered by Whispr footer with platform branding",
    ],
  },
  creatorDashboard: {
    label: "Creator Dashboard",
    color: "#a855f7",
    icon: "📊",
    description: "The creator's control center for managing messages, tracking revenue, and sharing their profile link.",
    flow: [
      "Sidebar navigation with Inbox, Replied, Earnings, and My Link sections",
      "Quick stats widget in sidebar showing weekly earnings and pending message count",
      "Creator profile info displayed at top of sidebar for context",
      "Mobile-responsive: sidebar collapses to bottom tab navigation on smaller screens",
    ],
  },
  creatorInbox: {
    label: "Creator Inbox",
    color: "#a855f7",
    icon: "✉️",
    description: "Where creators see and respond to incoming paid messages from fans.",
    flow: [
      "List of all new (unread) messages from fans, sorted by most recent",
      "Each row shows: fan avatar/initials, fan name, message preview, timestamp, and amount paid",
      "Purple dot indicator for unread messages",
      "Click a message to open full view with complete fan message",
      "Reply text area appears below the fan's message",
      "Send Reply button delivers response and notifies the fan via email",
      "Success animation confirms reply was sent",
      "Replied tab shows all previously answered conversations for reference",
    ],
  },
  creatorEarnings: {
    label: "Creator Earnings",
    color: "#a855f7",
    icon: "💰",
    description: "Revenue tracking dashboard with visual charts and payout information.",
    flow: [
      "Period toggle: This Week / This Month / All Time",
      "Stat tiles: Total Earned, Messages Received, Average Per Day",
      "Revenue trend bar chart showing earnings over selected period",
      "Next payout card: estimated amount and date, powered by Stripe Connect",
      "All amounts shown after platform fee deduction (creator sees their net earnings)",
    ],
  },
  creatorLink: {
    label: "Custom Link",
    color: "#a855f7",
    icon: "🔗",
    description: "Unique shareable URL that creators add to their social media bios to drive fan traffic.",
    flow: [
      "Personalized URL displayed: whispr.me/[username]",
      "One-click Copy Link button with confirmation feedback",
      "Live preview showing exactly how the link card will appear when fans visit",
      "Sharing tips: suggested placements for Instagram bio, TikTok bio, YouTube community tab, email newsletters, Discord/Telegram groups",
      "Link is auto-generated on profile creation — no extra setup needed",
    ],
  },

  // ─── PAYMENTS ───
  paymentCheckout: {
    label: "Payment / Checkout",
    color: "#f59e0b",
    icon: "💳",
    description: "The payment flow triggered when a fan sends a message or purchases a message pack.",
    flow: [
      "Fan clicks \"Send a Message\" on creator profile",
      "Message compose modal opens with text area and creator info",
      "Fee summary shown: message cost clearly displayed before payment",
      "Fan submits message — Stripe processes the payment securely",
      "If fan has stored payment method, payment is instant (one-click)",
      "If first-time payment, Stripe Elements collects card details inline",
      "Payment confirmation screen with estimated reply time",
      "Bulk packs: separate modal showing 3 pack options (5, 10, 25 messages) with savings percentage",
      "Refund policy displayed: automatic refund if creator doesn't reply within 7 days",
    ],
  },

  // ─── NOTIFICATIONS ───
  notifications: {
    label: "Notifications",
    color: "#ec4899",
    icon: "🔔",
    description: "Email notification system keeping both fans and creators informed of activity.",
    flow: [
      "Fan receives email when creator replies to their message",
      "Creator receives email when a new paid message arrives",
      "Payment confirmation email sent to fan after successful purchase",
      "Payout notification email sent to creator when Stripe processes payout",
      "Welcome email on registration (both fan and creator)",
      "Inactivity reminder if creator has unreplied messages older than 48 hours",
      "All emails include direct link to the relevant conversation or dashboard",
    ],
  },

  // ─── OTHER PAGES ───
  termsPrivacy: {
    label: "Terms & Privacy",
    color: "#6b7280",
    icon: "📄",
    description: "Legal pages required for platform operation and App Store compliance.",
    flow: [
      "Terms of Service: user agreement, payment terms, refund policy, content guidelines",
      "Privacy Policy: data collection, storage, third-party services (Stripe, Clerk), CCPA/GDPR compliance",
      "Accessible from footer on every page",
      "Must be accepted during registration",
    ],
  },
  support: {
    label: "Help & Support",
    color: "#6b7280",
    icon: "🛟",
    description: "Support resources for both fans and creators.",
    flow: [
      "FAQ page organized by topic: Payments, Messaging, Account, Creator Setup",
      "Contact form for direct support requests",
      "Email support with response time commitment",
      "Links to relevant help articles from contextual points in the app (e.g. payment issues from checkout)",
    ],
  },
};

// Group definitions for the sitemap layout
const groups = [
  {
    label: "Fan Experience",
    color: "#3b82f6",
    nodes: ["fanRegistration", "fanDashboard", "fanMessageThread", "fanAccount"],
  },
  {
    label: "Creator Experience",
    color: "#a855f7",
    nodes: ["creatorRegistration", "creatorProfile", "creatorDashboard", "creatorInbox", "creatorEarnings", "creatorLink"],
  },
  {
    label: "Payments & Notifications",
    color: "#f59e0b",
    nodes: ["paymentCheckout", "notifications"],
  },
  {
    label: "Other Pages",
    color: "#6b7280",
    nodes: ["termsPrivacy", "support"],
  },
];

/* ═══════════════════
   COMPONENTS
   ═══════════════════ */

const SitemapApp = () => {
  const [selectedNode, setSelectedNode] = useState(null);
  const [hoveredNode, setHoveredNode] = useState(null);
  const detailRef = useRef(null);

  useEffect(() => {
    if (selectedNode && detailRef.current) {
      detailRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, [selectedNode]);

  const nodeData = selectedNode ? siteData[selectedNode] : null;

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0b", color: "#e8e6e3", fontFamily: "'DM Sans', sans-serif" }}>

      {/* Header */}
      <div style={{
        padding: "20px 32px", borderBottom: "1px solid rgba(255,255,255,0.05)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        position: "sticky", top: 0, zIndex: 20,
        background: "rgba(10,10,11,0.9)", backdropFilter: "blur(12px)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 10,
            background: "linear-gradient(135deg, #7c3aed, #c8a2ff)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 15, fontWeight: 700,
          }}>✦</div>
          <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22 }}>Whispr</span>
          <span style={{
            fontSize: 10, fontWeight: 600, color: "#c8a2ff", background: "rgba(124,58,237,0.15)",
            padding: "3px 10px", borderRadius: 100, letterSpacing: "0.06em", marginLeft: 4,
          }}>SITEMAP</span>
        </div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)" }}>
          Click any page to see the detailed flow →
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "40px 32px 80px" }}>

        {/* ═══ ROOT NODE: HOME ═══ */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <button
            onClick={() => setSelectedNode("home")}
            onMouseEnter={() => setHoveredNode("home")}
            onMouseLeave={() => setHoveredNode(null)}
            style={{
              background: selectedNode === "home" ? "#22c55e" : hoveredNode === "home" ? "rgba(34,197,94,0.15)" : "rgba(34,197,94,0.08)",
              border: `2px solid ${selectedNode === "home" ? "#22c55e" : "rgba(34,197,94,0.3)"}`,
              borderRadius: 16, padding: "14px 32px",
              color: selectedNode === "home" ? "#0a0a0b" : "#22c55e",
              fontWeight: 600, fontSize: 15, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
              transition: "all 0.25s ease",
              display: "flex", alignItems: "center", gap: 10,
              transform: hoveredNode === "home" ? "translateY(-2px)" : "none",
              boxShadow: hoveredNode === "home" ? "0 8px 24px rgba(34,197,94,0.15)" : "none",
            }}
          >
            <span style={{ fontSize: 18 }}>🏠</span>
            Home / Landing Page
          </button>
        </div>

        {/* Connector line from Home to groups */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <div style={{ width: 2, height: 32, background: "rgba(255,255,255,0.08)" }} />
        </div>
        <div style={{
          height: 2, background: "rgba(255,255,255,0.08)",
          margin: "0 80px 0", borderRadius: 2,
        }} />

        {/* ═══ GROUP BRANCHES ═══ */}
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(4, 1fr)",
          gap: 20,
          marginTop: 0,
        }}>
          {groups.map((group, gi) => (
            <div key={gi} style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
              {/* Vertical connector from horizontal line */}
              <div style={{ width: 2, height: 24, background: "rgba(255,255,255,0.08)" }} />

              {/* Group label */}
              <div style={{
                fontSize: 11, fontWeight: 700, color: group.color,
                textTransform: "uppercase", letterSpacing: "0.1em",
                padding: "6px 14px", borderRadius: 100, marginBottom: 12,
                background: `${group.color}15`, border: `1px solid ${group.color}30`,
              }}>
                {group.label}
              </div>

              {/* Nodes */}
              <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
                {group.nodes.map((nodeKey, ni) => {
                  const node = siteData[nodeKey];
                  const isSelected = selectedNode === nodeKey;
                  const isHovered = hoveredNode === nodeKey;
                  return (
                    <div key={nodeKey} style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                      {ni > 0 && <div style={{ width: 1, height: 8, background: "rgba(255,255,255,0.06)", marginBottom: 8 }} />}
                      <button
                        onClick={() => setSelectedNode(nodeKey)}
                        onMouseEnter={() => setHoveredNode(nodeKey)}
                        onMouseLeave={() => setHoveredNode(null)}
                        style={{
                          width: "100%",
                          background: isSelected ? `${group.color}20` : isHovered ? `${group.color}10` : "rgba(255,255,255,0.025)",
                          border: `1.5px solid ${isSelected ? group.color : isHovered ? `${group.color}60` : "rgba(255,255,255,0.06)"}`,
                          borderRadius: 14,
                          padding: "12px 16px",
                          color: isSelected ? group.color : "#e8e6e3",
                          fontFamily: "'DM Sans', sans-serif",
                          fontSize: 13, fontWeight: 500,
                          cursor: "pointer",
                          transition: "all 0.25s ease",
                          display: "flex", alignItems: "center", gap: 10,
                          transform: isHovered ? "translateY(-1px)" : "none",
                          boxShadow: isSelected ? `0 4px 20px ${group.color}20` : "none",
                          textAlign: "left",
                        }}
                      >
                        <span style={{ fontSize: 16, flexShrink: 0 }}>{node.icon}</span>
                        <span>{node.label}</span>
                        <span style={{
                          marginLeft: "auto", fontSize: 14, color: isSelected ? group.color : "rgba(255,255,255,0.15)",
                          transition: "all 0.2s ease", flexShrink: 0,
                        }}>{isSelected ? "▾" : "›"}</span>
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* ═══ DETAIL PANEL ═══ */}
        {nodeData && (
          <div
            ref={detailRef}
            style={{
              marginTop: 48,
              background: "rgba(255,255,255,0.02)",
              border: `1px solid ${siteData[selectedNode].color}25`,
              borderRadius: 24,
              overflow: "hidden",
              animation: "detailIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
            }}
          >
            <style>{`
              @keyframes detailIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
              }
              @keyframes stepIn {
                from { opacity: 0; transform: translateX(-12px); }
                to { opacity: 1; transform: translateX(0); }
              }
            `}</style>

            {/* Detail header */}
            <div style={{
              padding: "28px 32px 24px",
              borderBottom: `1px solid ${siteData[selectedNode].color}15`,
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{
                  width: 48, height: 48, borderRadius: 14,
                  background: `${siteData[selectedNode].color}15`,
                  border: `1px solid ${siteData[selectedNode].color}30`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 22,
                }}>{nodeData.icon}</div>
                <div>
                  <h2 style={{
                    fontFamily: "'Instrument Serif', serif",
                    fontSize: 24, fontWeight: 400, marginBottom: 4,
                  }}>{nodeData.label}</h2>
                  <p style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", maxWidth: 500, lineHeight: 1.5 }}>
                    {nodeData.description}
                  </p>
                </div>
              </div>
              <button
                onClick={() => setSelectedNode(null)}
                style={{
                  background: "rgba(255,255,255,0.05)", border: "none",
                  color: "rgba(255,255,255,0.4)", width: 36, height: 36,
                  borderRadius: "50%", fontSize: 16, cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.2s ease", flexShrink: 0,
                }}
              >×</button>
            </div>

            {/* Flow steps */}
            <div style={{ padding: "28px 32px 32px" }}>
              <div style={{
                fontSize: 10, fontWeight: 700, color: siteData[selectedNode].color,
                textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 20,
              }}>
                User Flow — {nodeData.flow.length} Steps
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                {nodeData.flow.map((step, i) => (
                  <div key={i} style={{
                    display: "flex", gap: 16,
                    animation: `stepIn 0.35s ease ${i * 0.06}s both`,
                  }}>
                    {/* Step number + connector line */}
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: "50%",
                        background: `${siteData[selectedNode].color}15`,
                        border: `1.5px solid ${siteData[selectedNode].color}40`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, fontWeight: 700, color: siteData[selectedNode].color,
                        flexShrink: 0,
                      }}>{i + 1}</div>
                      {i < nodeData.flow.length - 1 && (
                        <div style={{
                          width: 1.5, flex: 1, minHeight: 16,
                          background: `${siteData[selectedNode].color}15`,
                        }} />
                      )}
                    </div>

                    {/* Step content */}
                    <div style={{
                      paddingBottom: i < nodeData.flow.length - 1 ? 20 : 0,
                      paddingTop: 5,
                    }}>
                      <p style={{
                        fontSize: 14, lineHeight: 1.65, color: "rgba(255,255,255,0.65)",
                      }}>{step}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Legend / summary */}
        <div style={{
          marginTop: 48, padding: "24px 28px",
          background: "rgba(255,255,255,0.02)",
          border: "1px solid rgba(255,255,255,0.05)",
          borderRadius: 18,
          display: "flex", alignItems: "center", justifyContent: "space-between",
          flexWrap: "wrap", gap: 16,
        }}>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)" }}>
            <span style={{ fontWeight: 600, color: "rgba(255,255,255,0.5)" }}>Total pages: </span>
            {Object.keys(siteData).length} screens across fan, creator, and shared experiences
          </div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            {[
              { label: "Fan", color: "#3b82f6" },
              { label: "Creator", color: "#a855f7" },
              { label: "Payments", color: "#f59e0b" },
              { label: "Other", color: "#6b7280" },
            ].map(l => (
              <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: l.color }} />
                <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{l.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{ textAlign: "center", marginTop: 32 }}>
          <p style={{ fontSize: 12, color: "rgba(255,255,255,0.15)" }}>
            Whispr Sitemap & User Flows — Confidential
          </p>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SitemapApp />);
</script>
</body>
</html>
